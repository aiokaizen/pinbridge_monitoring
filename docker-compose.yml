name: pinbridge-monitoring

networks:
  monitoring_internal:
    driver: bridge
    name: pinbridge-monitoring-internal

volumes:
  libsql_data:
    name: pinbridge-monitoring-libsql-data
  redis_data:
    name: pinbridge-monitoring-redis-data
  workflows_data:
    name: pinbridge-monitoring-workflows-data

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    container_name: pinbridge-monitoring-libsql
    restart: unless-stopped
    environment:
      SQLD_NODE: primary
    volumes:
      - libsql_data:/var/lib/sqld
    expose:
      - "8080"
      - "5001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "perl -e 'use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>\"127.0.0.1:8080\",Timeout=>1) ? 0 : 1);'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - monitoring_internal

  tinybird-local:
    image: tinybirdco/tinybird-local:latest
    platform: linux/amd64
    container_name: pinbridge-monitoring-tinybird
    restart: unless-stopped
    environment:
      COMPATIBILITY_MODE: "1"
    expose:
      - "7181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7181/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - monitoring_internal

  redis:
    image: redis/redis-stack-server:latest
    container_name: pinbridge-monitoring-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - monitoring_internal

  redis-http:
    image: hiett/serverless-redis-http:latest
    container_name: pinbridge-monitoring-redis-http
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      SRH_CONNECTION_STRING: redis://redis:6379
    expose:
      - "80"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring_internal

  workflows:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}
      dockerfile: apps/workflows/Dockerfile
    image: pinbridge-monitoring-workflows:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-workflows
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      PORT: "3000"
      SELF_HOST: "true"
      SITE_URL: ${DASHBOARD_PUBLIC_URL}
      WORKFLOWS_BASE_URL: ${WORKFLOWS_BASE_URL:-http://workflows:3000}
      CHECKER_BASE_URL: ${CHECKER_BASE_URL:-http://checker:8080}
      CHECKER_REGION: ${CHECKER_REGION:-ams}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://redis-http:80}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    volumes:
      - workflows_data:/app/data
    expose:
      - "3000"
    depends_on:
      libsql:
        condition: service_healthy
      redis-http:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring_internal

  server:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}
      dockerfile: apps/server/Dockerfile
    image: pinbridge-monitoring-server:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      PORT: "3000"
      SELF_HOST: "true"
      CHECKER_BASE_URL: ${CHECKER_BASE_URL:-http://checker:8080}
      CHECKER_REGION: ${CHECKER_REGION:-ams}
      CRON_SECRET: ${CRON_SECRET}
    expose:
      - "3000"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      checker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring_internal

  checker:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}/apps/checker
      dockerfile: Dockerfile
    image: pinbridge-monitoring-checker:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-checker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      SELF_HOST: "true"
      CRON_SECRET: ${CRON_SECRET}
      OPENSTATUS_WORKFLOWS_URL: ${OPENSTATUS_WORKFLOWS_URL:-http://workflows:3000}
      TINYBIRD_TOKEN: ${TINY_BIRD_API_KEY:-}
      CLOUD_PROVIDER: fly
      FLY_REGION: ${CHECKER_REGION:-ams}
    expose:
      - "8080"
    depends_on:
      workflows:
        condition: service_healthy
      tinybird-local:
        condition: service_healthy
    networks:
      - monitoring_internal

  private-location:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}/apps/private-location
      dockerfile: Dockerfile
    image: pinbridge-monitoring-private-location:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-private-location
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENSTATUS_KEY: ${OPENSTATUS_PRIVATE_LOCATION_KEY}
      OPENSTATUS_INGEST_URL: ${OPENSTATUS_INGEST_URL:-http://server:3000}
      DB_URL: ${DATABASE_URL:-http://libsql:8080}
      TINYBIRD_URL: ${TINYBIRD_URL:-http://tinybird-local:7181}
      GIN_MODE: release
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      server:
        condition: service_healthy
      tinybird-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring_internal

  dashboard:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}
      dockerfile: apps/dashboard/Dockerfile
    image: pinbridge-monitoring-dashboard:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
      SELF_HOST: "true"
      NEXT_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL}
      CHECKER_BASE_URL: ${CHECKER_BASE_URL:-http://checker:8080}
      CHECKER_REGION: ${CHECKER_REGION:-ams}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://redis-http:80}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    ports:
      - "${MONITORING_DASHBOARD_BIND_IP:-127.0.0.1}:${MONITORING_DASHBOARD_BIND_PORT:-3002}:3000"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
      checker:
        condition: service_started
      redis-http:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - monitoring_internal

  status-page:
    build:
      context: ${OPENSTATUS_SOURCE_DIR:-../openstatus}
      dockerfile: apps/status-page/Dockerfile
    image: pinbridge-monitoring-status-page:${OPENSTATUS_BUILD_TAG:-local}
    container_name: pinbridge-monitoring-status-page
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
      SELF_HOST: "true"
      NEXT_PUBLIC_URL: ${STATUS_PAGE_PUBLIC_URL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://redis-http:80}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    ports:
      - "${MONITORING_STATUS_BIND_IP:-127.0.0.1}:${MONITORING_STATUS_BIND_PORT:-3003}:3000"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
      redis-http:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - monitoring_internal
