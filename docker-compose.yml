name: pinbridge-monitoring

volumes:
  kuma_data:
    name: pinbridge-monitoring-kuma-data

services:
  kuma:
    image: ${UPTIME_KUMA_IMAGE:-louislam/uptime-kuma:1}
    container_name: pinbridge-monitoring-kuma
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${MONITORING_KUMA_BIND_IP:-127.0.0.1}:${MONITORING_KUMA_BIND_PORT:-3002}:3001"
    volumes:
      - kuma_data:/app/data
